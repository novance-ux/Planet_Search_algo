<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exoplanet Verification System</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <canvas id="stars"></canvas>

  <div class="container">
    <header>
      <h1>&#x1F52D; Exoplanet Verification System</h1>
      <p class="subtitle">Powered by 8 classification &amp; 8 regression models from Kepler telescope analysis</p>
    </header>

    <!-- ═══════════ FORM SECTION ═══════════ -->
    <section id="sec-form" class="fade-section visible">
      <form id="predict-form" autocomplete="off">

        <fieldset>
          <legend>Transit Parameters (Required)</legend>
          <div class="field-row">
            <div class="field">
              <label for="koi_period">Orbital Period</label>
              <div class="inp"><input type="number" step="any" id="koi_period" name="koi_period" placeholder="e.g. 365.25" required min="0.01"><span class="u">days</span></div>
            </div>
            <div class="field">
              <label for="koi_depth">Transit Depth</label>
              <div class="inp"><input type="number" step="any" id="koi_depth" name="koi_depth" placeholder="e.g. 84" required min="0"><span class="u">ppm</span></div>
            </div>
            <div class="field">
              <label for="koi_duration">Transit Duration</label>
              <div class="inp"><input type="number" step="any" id="koi_duration" name="koi_duration" placeholder="e.g. 13.0" required min="0"><span class="u">hrs</span></div>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Stellar Parameters (Required)</legend>
          <div class="field-row">
            <div class="field">
              <label for="koi_steff">Effective Temperature</label>
              <div class="inp"><input type="number" step="any" id="koi_steff" name="koi_steff" placeholder="e.g. 5778" required min="1"><span class="u">K</span></div>
            </div>
            <div class="field">
              <label for="koi_srad">Stellar Radius</label>
              <div class="inp"><input type="number" step="any" id="koi_srad" name="koi_srad" placeholder="e.g. 1.0" required min="0.01"><span class="u">R&#x2609;</span></div>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Position (Required)</legend>
          <div class="field-row">
            <div class="field">
              <label for="ra">Right Ascension</label>
              <div class="inp"><input type="number" step="any" id="ra" name="ra" placeholder="e.g. 291.0" required><span class="u">&deg;</span></div>
            </div>
            <div class="field">
              <label for="dec">Declination</label>
              <div class="inp"><input type="number" step="any" id="dec" name="dec" placeholder="e.g. 48.0" required><span class="u">&deg;</span></div>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Optional (auto-derived if blank)</legend>
          <div class="field-row">
            <div class="field">
              <label for="koi_score">Disposition Score</label>
              <div class="inp"><input type="number" step="any" id="koi_score" name="koi_score" placeholder="auto (median)" min="0" max="1"><span class="u">0–1</span></div>
            </div>
            <div class="field">
              <label for="koi_teq">Equilibrium Temp</label>
              <div class="inp"><input type="number" step="any" id="koi_teq" name="koi_teq" placeholder="auto-derive"><span class="u">K</span></div>
            </div>
            <div class="field">
              <label for="koi_insol">Insolation Flux</label>
              <div class="inp"><input type="number" step="any" id="koi_insol" name="koi_insol" placeholder="auto-derive"><span class="u">S&#x2295;</span></div>
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="koi_prad">Known Planet Radius</label>
              <div class="inp"><input type="number" step="any" id="koi_prad" name="koi_prad" placeholder="leave blank to predict" min="0.01"><span class="u">R&#x2295;</span></div>
            </div>
          </div>
        </fieldset>

        <div class="presets">
          <span>Presets:</span>
          <button type="button" class="preset-btn" data-preset="earth">&#x1F30D; Earth-like</button>
          <button type="button" class="preset-btn" data-preset="mars">&#x1F534; Mars</button>
          <button type="button" class="preset-btn" data-preset="jupiter">&#x1F300; Hot Jupiter</button>
          <button type="button" class="preset-btn" data-preset="kepler22b">&#x2B50; Kepler-22b</button>
        </div>

        <button type="submit" class="submit-btn">Analyse Candidate</button>
      </form>
    </section>

    <!-- ═══════════ LOADER ═══════════ -->
    <section id="sec-loader" class="fade-section">
      <div class="loader-wrap">
        <div class="orbit-loader"><div></div><div></div><div></div></div>
        <p>Running 16 models&hellip;</p>
      </div>
    </section>

    <!-- ═══════════ RESULTS ═══════════ -->
    <section id="sec-results" class="fade-section">
      <div id="results-content"></div>
      <button id="back-btn" class="submit-btn" style="margin-top:2rem">&#x2190; New Analysis</button>
    </section>
  </div>

  <script>
  /* ─── Starfield ─── */
  (function(){
    const c=document.getElementById('stars'),x=c.getContext('2d');
    let w,h,pts=[];
    function resize(){w=c.width=innerWidth;h=c.height=innerHeight;pts=[];for(let i=0;i<220;i++)pts.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,s:Math.random()*.4+.1,a:Math.random()*Math.PI*2});}
    function draw(){x.clearRect(0,0,w,h);for(const p of pts){p.a+=.01;const o=.5+.5*Math.sin(p.a);x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle=`rgba(255,255,255,${o})`;x.fill();p.y-=p.s;if(p.y<-2){p.y=h+2;p.x=Math.random()*w;}}requestAnimationFrame(draw);}
    resize();draw();addEventListener('resize',resize);
  })();

  /* ─── Section switching ─── */
  function showSection(id){
    document.querySelectorAll('.fade-section').forEach(s=>{s.classList.remove('visible');});
    setTimeout(()=>document.getElementById(id).classList.add('visible'),80);
  }

  /* ─── Presets ─── */
  const PRESETS={
    earth:{koi_period:365.25,koi_depth:84,koi_duration:13,koi_steff:5778,koi_srad:1,ra:291.93,dec:48.25,koi_teq:255,koi_insol:1,koi_score:.9},
    mars:{koi_period:686.98,koi_depth:24,koi_duration:13,koi_steff:5778,koi_srad:1,ra:286.13,dec:63.87,koi_teq:210,koi_insol:.43,koi_score:.65,koi_prad:.53},
    jupiter:{koi_period:3.5,koi_depth:14000,koi_duration:2.8,koi_steff:6200,koi_srad:1.3,ra:285,dec:45,koi_teq:1800,koi_insol:500,koi_score:.7},
    kepler22b:{koi_period:289.86,koi_depth:492,koi_duration:7.4,koi_steff:5518,koi_srad:.979,ra:286.21,dec:47.88,koi_teq:262,koi_insol:1.09,koi_score:.95},
  };
  document.querySelectorAll('.preset-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      const p=PRESETS[b.dataset.preset];
      if(!p)return;
      for(const[k,v]of Object.entries(p)){
        const el=document.getElementById(k);
        if(el)el.value=v;
      }
    });
  });

  /* ─── Form submit ─── */
  document.getElementById('predict-form').addEventListener('submit',async e=>{
    e.preventDefault();
    showSection('sec-loader');
    const fd=new FormData(e.target);
    const body={};
    fd.forEach((v,k)=>{if(v!=='')body[k]=parseFloat(v);});
    try{
      const resp=await fetch('/api/predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const data=await resp.json();
      if(data.error){alert('Error: '+data.error);showSection('sec-form');return;}
      renderResult(data);
      showSection('sec-results');
    }catch(err){alert('Request failed: '+err.message);showSection('sec-form');}
  });

  document.getElementById('back-btn').addEventListener('click',()=>showSection('sec-form'));

  /* ─── Render result ─── */
  function renderResult(d){
    const el=document.getElementById('results-content');
    const isConf=d.prediction==='CONFIRMED';
    const verdictClass=isConf?'verdict-confirmed':'verdict-fp';

    let html=`
    <div class="verdict-card ${verdictClass}">
      <div class="verdict-label">${isConf?'&#x2705; CONFIRMED EXOPLANET':'&#x274C; FALSE POSITIVE'}</div>
      <div class="verdict-prob">${d.confirmation_probability}% confirmation probability</div>
    </div>

    <div class="cards-row">
      <div class="card">
        <h3>${d.radius_source==='user'?'Known':'Predicted'} Radius</h3>
        <div class="big-val">${d.predicted_radius} <small>R&#x2295;</small></div>
        <div class="tag">${d.planet_type}</div>
        <p class="desc">${d.planet_type_desc}</p>
        <table class="kv" style="margin-top:.5rem;font-size:.82rem">
          <tr><td>Physics est.</td><td>${d.physics_radius} R&#x2295;</td></tr>
          <tr><td>ML avg</td><td>${d.ml_avg_radius} R&#x2295;</td></tr>
          <tr><td>Source</td><td>${d.radius_source}</td></tr>
        </table>
      </div>
      <div class="card">
        <h3>Habitability</h3>
        <div class="hab-ring" style="--score:${d.habitability_score}">
          <svg viewBox="0 0 36 36">
            <path class="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
            <path class="ring-fg" stroke-dasharray="${d.habitability_score}, 100"
                  d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
          </svg>
          <span class="ring-text">${d.habitability_score}</span>
        </div>
        <ul class="factor-list">${d.habitability_factors.map(f=>`<li>${f}</li>`).join('')}</ul>
      </div>
      <div class="card">
        <h3>Derived Values</h3>
        <table class="kv">
          <tr><td>Eq. Temp</td><td>${d.equilibrium_temp} K ${d.teq_auto_derived?'<em>(auto)</em>':''}</td></tr>
          <tr><td>Insol. Flux</td><td>${d.insolation_flux} S&#x2295; ${d.insol_auto_derived?'<em>(auto)</em>':''}</td></tr>
          <tr><td>Final Radius</td><td>${d.predicted_radius} R&#x2295; (${d.radius_source})</td></tr>
        </table>
      </div>
    </div>

    <div class="breakdown-section">
      <h2>Classification Model Breakdown</h2>
      <p class="note">Each model's probability that this candidate is a confirmed exoplanet.</p>
      <div class="bar-chart">${renderBars(d.clf_breakdown, d.clf_metrics, '%', true)}</div>
    </div>

    <div class="breakdown-section">
      <h2>Regression Model Breakdown</h2>
      <p class="note">Each model's predicted planetary radius (R&#x2295;). ML avg = ${d.ml_avg_radius} · Physics = ${d.physics_radius} · Final = ${d.predicted_radius}</p>
      <div class="bar-chart">${renderBars(d.reg_breakdown, d.reg_metrics, ' R&#x2295;', false)}</div>
    </div>

    <div class="breakdown-section">
      <h2>Input Summary</h2>
      <table class="summary-table">
        <tr><th>Parameter</th><th>Value</th></tr>
        ${Object.entries(d.input_summary).map(([k,v])=>`<tr><td>${fmtKey(k)}</td><td>${v}</td></tr>`).join('')}
      </table>
    </div>

    <div class="breakdown-section">
      <h2>Training Data Context</h2>
      <table class="summary-table">
        <tr><td>Total candidates</td><td>${d.dataset_info.total_rows||'—'}</td></tr>
        <tr><td>Confirmed</td><td>${d.dataset_info.confirmed||'—'}</td></tr>
        <tr><td>False Positives</td><td>${d.dataset_info.false_positive||'—'}</td></tr>
        <tr><td>Candidates</td><td>${d.dataset_info.candidate||'—'}</td></tr>
      </table>
    </div>`;

    el.innerHTML=html;

    // animate bars
    setTimeout(()=>{
      el.querySelectorAll('.bar-fill').forEach(b=>{b.style.width=b.dataset.width;});
    },50);
  }

  function renderBars(breakdown, metrics, unit, isPercent){
    const entries=Object.entries(breakdown);
    const maxVal=Math.max(...entries.map(e=>e[1]),0.01);
    return entries.map(([name,val])=>{
      const pct=isPercent?val:(val/maxVal*100);
      const metricStr=metrics&&metrics[name]?fmtMetrics(metrics[name],isPercent):'';
      return `<div class="bar-row">
        <div class="bar-label">${name}</div>
        <div class="bar-track">
          <div class="bar-fill" data-width="${Math.min(pct,100)}%" style="width:0%"></div>
          <span class="bar-val">${val}${unit}</span>
        </div>
        <div class="bar-metric">${metricStr}</div>
      </div>`;
    }).join('');
  }

  function fmtMetrics(m, isClf){
    if(isClf) return `Acc ${m.accuracy} · AUC ${m.roc_auc}`;
    return `R² ${m.r2} · MAE ${m.mae}`;
  }

  const KEY_MAP={koi_period:'Orbital Period (days)',koi_depth:'Transit Depth (ppm)',koi_duration:'Transit Duration (hrs)',
    koi_steff:'Eff. Temperature (K)',koi_srad:'Stellar Radius (R☉)',ra:'RA (°)',dec:'Dec (°)',
    koi_score:'Disposition Score',koi_teq:'Eq. Temperature (K)',koi_insol:'Insolation Flux (S⊕)'};
  function fmtKey(k){return KEY_MAP[k]||k;}
  </script>
</body>
</html>
